<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable | EduTrack</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="layout">
        <aside class="sidebar glass">
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 3rem;">
                <div style="background: var(--primary); padding: 0.5rem; border-radius: 10px;">
                    <i data-lucide="wifi" style="color: white; width: 20px; height: 20px;"></i>
                </div>
                <h2>EduTrack</h2>
            </div>
            <nav style="flex: 1;">
                <ul style="list-style: none;">
                    <li style="margin-bottom: 0.5rem;"><a id="dashLink" href="#" class="btn"
                            style="justify-content: flex-start; color: var(--text-muted);"><i
                                data-lucide="layout-dashboard"></i> Dashboard</a></li>
                    <li style="margin-bottom: 0.5rem;"><a href="timetable.html" class="btn btn-primary"
                            style="justify-content: flex-start;"><i data-lucide="calendar"></i> Timetable</a></li>
                    <li style="margin-bottom: 0.5rem;"><a href="history.html" class="btn"
                            style="justify-content: flex-start; color: var(--text-muted);"><i data-lucide="history"></i>
                            History</a></li>
                </ul>
            </nav>
            <button onclick="clearUser()" class="btn"
                style="justify-content: flex-start; color: var(--danger); background: transparent;">
                <i data-lucide="log-out"></i> Logout
            </button>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2.5rem;">
                <h1>Weekly Timetable</h1>
                <p style="color: var(--text-muted);">Class Schedule for <span id="userName">User</span></p>
            </header>

            <div class="glass card" style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; min-width: 600px;">
                    <thead>
                        <tr
                            style="text-align: left; color: var(--text-muted); border-bottom: 1px solid var(--glass-border);">
                            <th style="padding: 1rem;">Time</th>
                            <th style="padding: 1rem;">Monday</th>
                            <th style="padding: 1rem;">Tuesday</th>
                            <th style="padding: 1rem;">Wednesday</th>
                            <th style="padding: 1rem;">Thursday</th>
                            <th style="padding: 1rem;">Friday</th>
                        </tr>
                    </thead>
                    <tbody id="timetableBody">
                        <!-- Simulated Rows -->
                        <tr style="border-bottom: 1px solid var(--glass-border);">
                            <td style="padding: 1.5rem 1rem; color: var(--primary-light); font-weight: 600;">09:00 -
                                10:30</td>
                            <td style="padding: 1rem;">
                                <div class="glass"
                                    style="padding: 0.5rem; font-size: 0.8rem; border-left: 3px solid var(--primary);">
                                    CN (Lab 1)</div>
                            </td>
                            <td style="padding: 1rem;">-</td>
                            <td style="padding: 1rem;">
                                <div class="glass"
                                    style="padding: 0.5rem; font-size: 0.8rem; border-left: 3px solid var(--success);">
                                    OS (102)</div>
                            </td>
                            <td style="padding: 1rem;">-</td>
                            <td style="padding: 1rem;">
                                <div class="glass"
                                    style="padding: 0.5rem; font-size: 0.8rem; border-left: 3px solid var(--warning);">
                                    AI (204)</div>
                            </td>
                        </tr>
                        <tr style="border-bottom: 1px solid var(--glass-border);">
                            <td style="padding: 1.5rem 1rem; color: var(--primary-light); font-weight: 600;">11:00 -
                                12:30</td>
                            <td style="padding: 1rem;">-</td>
                            <td style="padding: 1rem;">
                                <div class="glass"
                                    style="padding: 0.5rem; font-size: 0.8rem; border-left: 3px solid var(--primary);">
                                    DBMS (105)</div>
                            </td>
                            <td style="padding: 1rem;">-</td>
                            <td style="padding: 1rem;">
                                <div class="glass"
                                    style="padding: 0.5rem; font-size: 0.8rem; border-left: 3px solid var(--success);">
                                    CN (Lab 1)</div>
                            </td>
                            <td style="padding: 1rem;">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../js/mock-data.js"></script>
    <script>
        lucide.createIcons();
        const user = State.currentUser;
        if (user) {
            document.getElementById('userName').innerText = user.name;
            document.getElementById('dashLink').href = `${user.role}.html`;
        }
    </script>
</body>

</html>
